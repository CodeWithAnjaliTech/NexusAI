services:
  - type: web
    name: nexusai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CHROMA_HOST
        sync: false
      - key: CHROMA_PORT
        value: "8000"
      - key: SECRET_KEY
        generateValue: true
      - key: OLLAMA_BASE_URL
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: SANDBOX_USE_DOCKER
        value: "false"
      - key: SANDBOX_PREWARM_ON_STARTUP
        value: "false"
      - key: LLM_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_ENV
        value: "production"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","https://nexus-ai-rouge-five.vercel.app"]'

databases:
  - name: nexusai-db
    plan: starter
    postgresMajorVersion: "16"
